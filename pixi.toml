[workspace]
name = "tidegs"
version = "0.1.0"
description = "TideGS: memory-efficient 3D Gaussian Splatting"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.10.*"
pip = ">=24"
pytorch = "==2.4.0"
torchvision = "==0.19.0"
torchaudio = "==2.4.0"
pytorch-cuda = "12.4.*"
cuda-toolkit = "12.4.*"
cuda-nvcc = "==12.4.131"
cuda-cccl = "==12.4.127"
plotly = ">=6,<7"

[activation.env]
PYTORCH_CUDA_ALLOC_CONF = "expandable_segments:True"
MAX_JOBS = "4"

[tasks]
cuda-info = "python -c \"import torch; print(f'torch={torch.__version__}, torch_cuda={torch.version.cuda}, cuda_available={torch.cuda.is_available()}'); print(torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'GPU unavailable')\""
install-python-deps = "python -m pip install -r requirements.txt jaxtyping rich ninja pytest scikit-build cmake pybind11 fast-tsp"
setup-extensions = { cmd = "CPATH=\"$CONDA_PREFIX/targets/x86_64-linux/include/cccl:$CONDA_PREFIX/targets/x86_64-linux/include:$CONDA_PREFIX/include\" LIBRARY_PATH=\"$CONDA_PREFIX/targets/x86_64-linux/lib:$CONDA_PREFIX/lib\" python -m pip install --no-build-isolation submodules/clm_kernels submodules/gsplat submodules/simple-knn && python -m pip install --force-reinstall --no-deps gsplat==1.0.0 && cp submodules/gsplat/build/lib.linux-x86_64-cpython-310/gsplat/csrc.so \"$CONDA_PREFIX/lib/python3.10/site-packages/gsplat/csrc.so\" && cp submodules/gsplat/build/lib.linux-x86_64-cpython-310/gsplat/csrc_legacy.so \"$CONDA_PREFIX/lib/python3.10/site-packages/gsplat/csrc_legacy.so\"", depends-on = ["install-python-deps"] }
test = { cmd = "python -m pytest -q tests", depends-on = ["setup-extensions"] }
